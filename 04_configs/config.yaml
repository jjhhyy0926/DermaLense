# ============================================================
# Flow 프로젝트 중앙 설정 파일
# 모든 경로·파라미터는 여기서만 수정하세요.
# ============================================================

# ── 경로 설정 ────────────────────────────────────────────────
paths:
  raw_dir:       "00_data/00_raw"
  interim_dir:   "00_data/01_interim"
  processed_dir: "00_data/02_processed"
  artifacts_dir: "05_artifacts/faiss"

  raw_files:
    paulaschoice: "paulaschoice_ingredients.csv"
    coos:         "coos_성분정보.xlsx"
    hwahae:       "hwahae_all.csv"

  output_files:
    merged_json:  "ingredient_merged2.json"
    product_db:   "product_db.csv"
    chunk_prefix: "ingredient_chunks_preset"   # + {1~4}.json

# ── 검증 설정 (ingestion) ────────────────────────────────────
validation:
  paulaschoice:
    required_cols: ["한글명", "영문명", "등급", "효과별", "분류", "성분설명"]
  coos:
    required_cols: ["성분명", "INCI", "기능", "스코어"]
  hwahae:
    required_cols: ["korean", "english", "product_id", "product_name"]

# ── 전처리 설정 ──────────────────────────────────────────────
preprocessing:
  paulaschoice:
    drop_cols: ["연관성분", "참고논문"]
    rename_cols:
      한글명:   ingredient_ko
      영문명:   ingredient_en
      등급:     pc_rating
      효과별:   pc_effect
      분류:     pc_category
      성분설명: pc_description

  coos:
    drop_cols:
      - URL
      - 구명칭
      - "EC No."
      - 구조식
      - "유럽 CosIng Ref No."
      - 링크
      - 한글명
      - 이명
    fillna_cols:
      스코어:      "0"
      "데이터 등급": "0"
    rename_cols:
      성분명:        ingredient_ko
      INCI:          ingredient_en
      기능:          coos_function
      종류:          coos_type
      "CAS No.":     coos_cas_no
      국가:          coos_country
      🇰🇷국내:       coos_kr_restricted
      🇨🇳중국:       coos_cn_restricted
      🇹🇼대만:       coos_tw_restricted
      🇯🇵일본:       coos_jp_restricted
      🇩🇪유럽:       coos_eu_restricted
      🇻🇳아세안:     coos_asean_restricted
      AI설명:        coos_ai_description
      스코어:        coos_score
      "데이터 등급": coos_data_grade

  hwahae:
    drop_cols:
      - discount_rate
      - capacity
      - sub_attrs
      - sub_product_name
      - concentration_info
      - skin_type
      - skin_remark_good
      - skin_remark_bad
    fillna_cols:
      primary_attr: 클렌징
    rename_cols:
      korean:  ingredient_ko
      english: ingredient_en

  post_merge_drop_cols:
    - hw_ingredient_id
    - hw_is_allergy
    - hw_purposes
    - coos_cas_no
    - coos_country

  coos_score_map:
    안전: 1
    주의: 2
    위험: 3

  pc_rating_map:
    훌륭함:    1
    좋음:      2
    보통:      3
    나쁨:      4
    매우 나쁨: 5

# ── product_db 컬럼 설정 ─────────────────────────────────────
product_db:
  source_cols:
    - korean
    - product_id
    - product_name
    - brand_name
    - ingredient_count
    - primary_attr
    - price
    - consumer_price
    - avg_ratings
    - review_count
    - topics_positive
    - topics_negative
  rename_cols:
    korean:           ingredient_ko
    product_id:       hw_product_id
    product_name:     hw_product_name
    brand_name:       hw_brand_name
    ingredient_count: hw_ingredient_count
    primary_attr:     hw_primary_attr
    price:            hw_price
    consumer_price:   hw_consumer_price
    avg_ratings:      hw_avg_ratings
    review_count:     hw_review_count
    topics_positive:  hw_topics_positive
    topics_negative:  hw_topics_negative

# ── 청킹 설정 ────────────────────────────────────────────────
chunking:
  priority_cols:
    - pc_description
    - coos_function
    - hw_ewg
    - coos_score

  weight_presets:
    1: { ewg: 0.33, basic_info: 0.33, expert: 0.33 }   # 균등
    2: { ewg: 0.50, basic_info: 0.35, expert: 0.15 }   # EWG 중심
    3: { ewg: 0.40, basic_info: 0.45, expert: 0.15 }   # 기본정보 중심
    4: { ewg: 0.45, basic_info: 0.45, expert: 0.10 }   # 균형

  coos_score_label:
    "1": "안전"
    "2": "주의"
    "3": "위험"

# ── 임베딩 설정 ──────────────────────────────────────────────
embedding:
  model_name: "jhgan/ko-sroberta-multitask"
  device:     "cuda"
  normalize:  true
  faiss_save_prefix: "faiss_index_preset"
